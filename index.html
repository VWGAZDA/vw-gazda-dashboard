<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>GAZDA Katowice · Dashboard dzienny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1b2e; --card:#162032; --border:#1e3a5f; --accent:#00b0f0;
  --text:#cbd5e1; --dim:#4a6080; --good:#22c55e; --bad:#ef4444; --warn:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.45;min-height:100vh}
button{font-family:inherit}
h1,h2,h3{font-weight:700;color:#e8eef7}
.hidden{display:none!important}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:16px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px 32px;width:100%;max-width:380px;text-align:center}
.login-card .brand{font-size:11px;letter-spacing:.22em;color:var(--accent);font-weight:700;text-transform:uppercase}
.login-card h1{font-size:22px;margin:10px 0 2px}
.login-card .sub{color:var(--dim);font-size:12.5px;margin-bottom:24px}
.login-card input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:#0f1726;color:#e8eef7;font-size:15px;outline:none;text-align:center;letter-spacing:.12em}
.login-card input:focus{border-color:var(--accent)}
.login-card button{margin-top:14px;width:100%;padding:12px;border:none;border-radius:8px;background:var(--accent);color:#04121f;font-weight:700;font-size:14px;cursor:pointer}
.login-card button:hover{filter:brightness(1.1)}
#login-err{color:var(--bad);font-size:12.5px;margin-top:10px;min-height:16px}

/* ===== SPLASH ===== */
#splash{position:fixed;inset:0;background:rgba(9,16,28,.97);z-index:90;overflow-y:auto;padding:22px 14px 40px}
.splash-inner{max-width:860px;margin:0 auto}
.splash-inner h1{font-size:20px;margin-bottom:2px}
.splash-date{color:var(--dim);font-size:12.5px;margin-bottom:18px}
.splash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:16px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 14px 12px}
.stat .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-weight:600}
.stat .val{font-size:26px;font-weight:800;color:#e8eef7;margin-top:2px}
.stat .val small{font-size:13px;color:var(--dim);font-weight:600}
.stat .note{font-size:11px;color:var(--dim);margin-top:1px}
.stat.hl .val{color:var(--accent)}
.leaders{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:6px 0 16px}
.leader{background:linear-gradient(135deg,#12263f,#162032);border:1px solid var(--border);border-radius:10px;padding:14px}
.leader .who{font-size:16px;font-weight:700;color:#e8eef7;margin-top:2px}
.leader .res{color:var(--accent);font-weight:700;font-size:13px}
.kon-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px}
.kon-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:10px}
.kon{display:flex;align-items:flex-end;gap:2px;height:90px}
.kon .bar{flex:1;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px;position:relative}
.kon .bar.wknd{background:#25405f}
.kon .bar.zero{background:#1a2a42}
.kon-days{display:flex;gap:2px;margin-top:4px}
.kon-days span{flex:1;text-align:center;font-size:8.5px;color:var(--dim)}
.splash-btn{display:block;width:100%;max-width:340px;margin:8px auto 0;padding:14px;border:none;border-radius:10px;background:var(--accent);color:#04121f;font-weight:800;font-size:15px;cursor:pointer}
.splash-op{background:var(--card);border:1px solid var(--accent);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.splash-op .m{color:var(--dim);font-size:11.5px}
.info-line{color:var(--dim);font-size:12px;margin:8px 0 14px}

/* ===== PROGRESS ===== */
.pbar{background:#0f1726;border:1px solid var(--border);border-radius:99px;height:22px;overflow:hidden;position:relative}
.pbar .fill{height:100%;border-radius:99px;background:var(--warn);transition:width .6s ease;min-width:4px}
.pbar .fill.blue{background:var(--accent)}
.pbar .fill.good{background:var(--good)}
.pbar .txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6)}

/* ===== APP ===== */
#app{max-width:1180px;margin:0 auto;padding:14px 12px 60px}
.top{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 14px;padding:6px 2px 12px}
.top .brand{font-size:11px;letter-spacing:.2em;color:var(--accent);font-weight:800;text-transform:uppercase}
.top h1{font-size:19px}
.top .date{color:var(--dim);font-size:12px;margin-left:auto}
nav.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;border-bottom:1px solid var(--border);scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;border:none;background:transparent;color:var(--dim);font-weight:600;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
nav.subtabs{display:flex;gap:6px;overflow-x:auto;margin:12px 0 4px;scrollbar-width:none}
nav.subtabs::-webkit-scrollbar{display:none}
.subtab{padding:6px 12px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-weight:600;font-size:12px;cursor:pointer;border-radius:99px;white-space:nowrap}
.subtab.active{color:#04121f;background:var(--accent);border-color:var(--accent)}
.section{margin-top:12px}

/* ===== CARDS/TABLES ===== */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#9fb3cc;margin-bottom:12px}
.card .desc{font-size:12px;color:var(--dim);margin:-6px 0 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr}.leaders{grid-template-columns:1fr}}
.table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:480px}
th{background:#101c30;color:var(--dim);text-transform:uppercase;font-size:10.5px;letter-spacing:.06em;padding:9px 10px;text-align:left;white-space:nowrap}
td{padding:8px 10px;border-top:1px solid #1a2c47;white-space:nowrap}
tr.sum td{font-weight:800;color:#e8eef7;background:#101c30}
tr.hl-green td{background:rgba(34,197,94,.09)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10.5px;font-weight:700}
.badge.good{background:rgba(34,197,94,.15);color:var(--good)}
.badge.bad{background:rgba(239,68,68,.15);color:var(--bad)}
.badge.warn{background:rgba(245,158,11,.15);color:var(--warn)}
.badge.blue{background:rgba(0,176,240,.15);color:var(--accent)}
.badge.dim{background:#1a2a42;color:var(--dim)}
.minibar{display:inline-block;height:8px;border-radius:99px;background:var(--accent);vertical-align:middle;min-width:2px}
.minibar.good{background:var(--good)}
.minibar.warn{background:var(--warn)}
.minibar.bad{background:var(--bad)}
.mono{font-family:ui-monospace,Consolas,monospace;font-size:11.5px;color:#9fb3cc}
.banner{background:rgba(0,176,240,.08);border:1px solid rgba(0,176,240,.35);border-radius:10px;padding:14px 16px;font-size:13px;margin-bottom:14px}
.banner b{color:var(--accent)}
.empty{color:var(--dim);font-size:12.5px;padding:14px;text-align:center}
.kpi-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.tile{background:#101c30;border:1px solid var(--border);border-radius:10px;padding:12px}
.tile .lbl{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.tile .val{font-size:22px;font-weight:800;color:#e8eef7}
.tile .val small{font-size:12px;color:var(--dim)}
.task-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.task-grid{grid-template-columns:1fr}}
.person-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px solid #1a2c47;font-size:12.5px}
.person-row:first-of-type{border-top:none}
.person-row .nm{flex:0 0 150px;overflow:hidden;text-overflow:ellipsis}
.person-row .bar-track{flex:1;height:8px;background:#0f1726;border-radius:99px;overflow:hidden}
.person-row .bar-fill{height:100%;background:var(--accent);border-radius:99px}
.person-row .sc{flex:0 0 44px;text-align:right;font-weight:700;color:#e8eef7;font-variant-numeric:tabular-nums}

/* ===== GRAFIK ===== */
.grafik-table td,.grafik-table th{padding:5px 4px;text-align:center;font-size:11px}
.grafik-table td:first-child,.grafik-table th:first-child{text-align:left;position:sticky;left:0;background:var(--card);font-weight:600}
.grafik-table td.wknd,.grafik-table th.wknd{background:#101a2c;color:var(--dim)}
.grafik-table td.hol,.grafik-table th.hol{background:rgba(239,68,68,.12)}
.g-U{color:var(--warn);font-weight:800}
.g-Z{color:var(--bad);font-weight:800}
.g-S{color:var(--accent);font-weight:800}
.toggle{display:inline-flex;border:1px solid var(--border);border-radius:99px;overflow:hidden;margin-bottom:12px}
.toggle button{padding:6px 14px;border:none;background:transparent;color:var(--dim);font-weight:600;font-size:12px;cursor:pointer}
.toggle button.active{background:var(--accent);color:#04121f}
footer{color:var(--dim);font-size:11px;text-align:center;margin-top:30px}
</style>
</head>

<script id="login-script">
/* ===== LOGOWANIE (SHA-256 + sessionStorage) + SPLASH =====
   Hasło: zmień PASS_HASH na sha256 nowego hasła.           */
(function () {
  var PASS_HASH = 'f9689197203df75a624fd47bcc58b643fb95a0d3cd71780c728c368b95cab872';
  var SKEY = 'gazda_dash_auth';
  var SPLASH_KEY = 'gazda_dash_splash';
  var mem = {};
  var store = {
    get: function (k) { try { return sessionStorage.getItem(k); } catch (e) { return mem[k] || null; } },
    set: function (k, v) { try { sessionStorage.setItem(k, v); } catch (e) { mem[k] = v; } }
  };

  function sha256(str) {
    var buf = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', buf).then(function (h) {
      var a = Array.from(new Uint8Array(h));
      return a.map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
    });
  }

  function enter() {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    if (typeof window.renderApp === 'function') window.renderApp();
    if (!store.get(SPLASH_KEY)) {
      showSplash();
      store.set(SPLASH_KEY, '1');
    }
  }

  function tryLogin() {
    var v = document.getElementById('pwd').value;
    sha256(v).then(function (h) {
      if (h === PASS_HASH) {
        store.set(SKEY, h);
        enter();
      } else {
        document.getElementById('login-err').textContent = 'Nieprawidłowe hasło.';
      }
    });
  }

  /* ---------- SPLASH (HTML budowany konkatenacją stringów) ---------- */
  function showSplash() {
    var D = DATA;
    var c = D.cele;
    var pct = c.cel_zespolowy > 0 ? Math.round(c.wykonanie_realne / c.cel_zespolowy * 100) : 0;
    var fillCls = pct >= 80 ? 'good' : (pct >= 50 ? 'blue' : '');
    var aekPlus = 0, i;
    var obszary = Object.keys(D.stan_aek);
    for (i = 0; i < obszary.length; i++) aekPlus += D.stan_aek[obszary[i]].p;
    var przet120 = D.przet.w120.length;

    /* liderzy */
    var liderAAK = '—', maxA = 0;
    for (i = 0; i < c.cele.length; i++) {
      if (c.cele[i].wykonanie > maxA) { maxA = c.cele[i].wykonanie; liderAAK = c.cele[i].name; }
      else if (c.cele[i].wykonanie === maxA && maxA > 0) { liderAAK += ' / ' + c.cele[i].name; }
    }
    var liderAEK = '—', maxE = 0;
    var allH = D.handlowcy_detal.concat(D.handlowcy_flota);
    for (i = 0; i < allH.length; i++) {
      if (allH[i].d > maxE) { maxE = allH[i].d; liderAEK = allH[i].name; }
    }

    /* wykres koniunktury — budowany PRZED wstawieniem do overlay */
    var koniunkturaHTML = '';
    var daysHTML = '';
    for (i = 0; i < D.koniunktura.length; i++) {
      var k = D.koniunktura[i];
      var h = Math.round(k.v * 100);
      var cls = 'bar' + (k.wknd ? ' wknd' : '') + (k.raw === 0 ? ' zero' : '');
      koniunkturaHTML += '<div class="' + cls + '" style="height:' + Math.max(h, 3) + '%" title="Dzień ' + k.d + ': ' + k.raw + '"></div>';
      daysHTML += '<span>' + (k.d % 2 === 1 ? k.d : '') + '</span>';
    }

    /* nowe opinie */
    var opinieHTML = '';
    var nowe = [];
    for (i = 0; i < D.opinie_google.length; i++) if (D.opinie_google[i].nowa) nowe.push(D.opinie_google[i]);
    if (nowe.length > 0) {
      opinieHTML += '<div class="kon-title" style="margin:14px 0 8px">Nowe opinie Google (od ' + (D.opinie_poprzedni_raport || 'poprzedniego raportu') + ')</div>';
      for (i = 0; i < nowe.length; i++) {
        opinieHTML += '<div class="splash-op"><div class="m">' + nowe[i].data + ' · ' + nowe[i].nazwa + ' · opiekun: ' + nowe[i].handlowiec + '</div><div>' + nowe[i].tresc + '</div></div>';
      }
    } else {
      opinieHTML = '<div class="info-line">Brak nowych opinii Google od poprzedniego raportu.</div>';
    }

    var html = '';
    html += '<div class="splash-inner">';
    html += '<h1>Dzień dobry, GAZDA Katowice 👋</h1>';
    html += '<div class="splash-date">Stan na ' + D.meta.data_raportu_pl + ' · upływ miesiąca ' + Math.round(c.uplyw * 100) + '%</div>';
    html += '<div class="kon-title">Realizacja AAK — lipiec</div>';
    html += '<div class="pbar"><div class="fill ' + fillCls + '" style="width:' + Math.min(pct, 100) + '%"></div><div class="txt">' + c.wykonanie_realne + ' / ' + c.cel_zespolowy + ' &nbsp;(' + pct + '%)</div></div>';
    html += '<div class="splash-grid">';
    html += '<div class="stat hl"><div class="lbl">Zamówienia AEK</div><div class="val">+' + aekPlus + '</div><div class="note">suma przyrostów</div></div>';
    html += '<div class="stat"><div class="lbl">Magazyn</div><div class="val">' + D.magazyn.razem + '</div><div class="note">CU ' + D.magazyn.klienc + ' · DE ' + D.magazyn.wolne + '</div></div>';
    html += '<div class="stat"><div class="lbl">Przeterminowane 120d+</div><div class="val" style="color:var(--bad)">' + przet120 + '</div><div class="note">wg age RTT</div></div>';
    var tiNow = D.trade_in_crm.wygranych.length;
    var tiPrev = D.trade_in_crm.poprzedni_wygranych.length;
    var opinieMc = 0;
    for (i = 0; i < D.kpi_handlowcy.length; i++) opinieMc += D.kpi_handlowcy[i].opinie;
    html += '<div class="stat"><div class="lbl">Trade-in odkupy</div><div class="val">' + tiNow + '</div><div class="note">czerwiec: ' + tiPrev + '</div></div>';
    html += '<div class="stat"><div class="lbl">Opinie Google</div><div class="val">' + opinieMc + '</div><div class="note">w lipcu (cel 5/os.)</div></div>';
    html += '</div>';
    html += '<div class="leaders">';
    html += '<div class="leader"><div class="kon-title">Lider AAK</div><div class="who">' + liderAAK + '</div><div class="res">' + maxA + ' szt.</div></div>';
    html += '<div class="leader"><div class="kon-title">Lider AEK</div><div class="who">' + liderAEK + '</div><div class="res">+' + maxE + ' zamówień</div></div>';
    html += '</div>';
    html += '<div class="kon-wrap"><div class="kon-title">Koniunktura dzienna — lipiec (oferty + klienci + traffic z CRM; weekendy ciemne)</div>';
    html += '<div class="kon">' + koniunkturaHTML + '</div><div class="kon-days">' + daysHTML + '</div></div>';
    html += opinieHTML;
    html += '<button class="splash-btn" id="splash-go">Przejdź do dashboardu →</button>';
    html += '</div>';

    var overlay = document.createElement('div');
    overlay.id = 'splash';
    overlay.innerHTML = html;
    document.body.appendChild(overlay);
    document.getElementById('splash-go').addEventListener('click', function () {
      overlay.remove();
    });
  }

  document.getElementById('pwd-btn').addEventListener('click', tryLogin);
  document.getElementById('pwd').addEventListener('keydown', function (e) { if (e.key === 'Enter') tryLogin(); });

  if (store.get(SKEY) === PASS_HASH) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', enter);
    } else {
      enter();
    }
  }
})();
</script>

<script>
/* ============================================================
   RENDER APLIKACJI
   ============================================================ */
const TABS = [
  { id: 'cele', label: 'Cele i zadania', subs: ['Cele AAK', 'Zadania', 'Realizacja', 'Stan zamówień AEK'] },
  { id: 'handlowcy', label: 'Handlowcy', subs: ['AEK & Kanały', 'KPI', 'Rankingi', 'Grafik', 'Opinie Google'] },
  { id: 'stock', label: 'Stock', subs: ['Magazyn', 'Przeterminowane', 'Dostawy', 'Prognoza', 'Push', 'Funkcyjne'] },
  { id: 'tradein', label: 'Trade-in CRM', subs: [] },
  { id: 'produkcja', label: 'Informacja produkcyjna', subs: ['Komunikaty', 'Przerwy', 'Kalendarz', 'Restrykcje'] },
];
let curTab = 'cele';
let curSub = 0;
let grafikMonth = 'aktualny';

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const fmtMc = (m) => {
  if (m === 'brak') return 'brak ETA';
  const nm = ['', 'styczeń', 'luty', 'marzec', 'kwiecień', 'maj', 'czerwiec', 'lipiec', 'sierpień', 'wrzesień', 'październik', 'listopad', 'grudzień'];
  const [y, mm] = m.split('-');
  return nm[parseInt(mm, 10)] + ' ' + y;
};
function minibar(v, max, cls, w = 70) {
  const px = max > 0 ? Math.max(2, Math.round(v / max * w)) : 2;
  return `<span class="minibar ${cls || ''}" style="width:${px}px"></span>`;
}
function statusBadge(st) {
  if (st === 'flota') return '<span class="badge dim">cel flotowy</span>';
  if (st === 'good') return '<span class="badge good">na kursie</span>';
  if (st === 'mid') return '<span class="badge warn">do nadrobienia</span>';
  return '<span class="badge bad">ryzyko</span>';
}
function tbl(head, rowsHtml, minw) {
  return `<div class="table-wrap"><div class="table-scroll"><table${minw ? ` style="min-width:${minw}px"` : ''}><thead><tr>${head}</tr></thead><tbody>${rowsHtml}</tbody></table></div></div>`;
}

function renderApp() {
  $('hdr-date').textContent = 'Stan na ' + DATA.meta.data_raportu_pl;
  $('foot').textContent = 'Źródło: ' + DATA.meta.zrodlo + ' · Dashboard wewnętrzny — nie udostępniać poza zespół.';
  const nav = $('main-tabs');
  nav.innerHTML = TABS.map(t => `<button class="tab${t.id === curTab ? ' active' : ''}" data-t="${t.id}">${t.label}</button>`).join('');
  nav.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => { curTab = b.dataset.t; curSub = 0; renderApp(); }));
  const t = TABS.find(x => x.id === curTab);
  const sn = $('sub-tabs');
  if (t.subs.length) {
    sn.innerHTML = t.subs.map((s, i) => `<button class="subtab${i === curSub ? ' active' : ''}" data-i="${i}">${s}</button>`).join('');
    sn.querySelectorAll('.subtab').forEach(b => b.addEventListener('click', () => { curSub = parseInt(b.dataset.i, 10); renderApp(); }));
    sn.classList.remove('hidden');
  } else { sn.innerHTML = ''; sn.classList.add('hidden'); }
  const c = $('content');
  c.innerHTML = '';
  if (curTab === 'cele') renderCele(c);
  else if (curTab === 'handlowcy') renderHandlowcy(c);
  else if (curTab === 'stock') renderStock(c);
  else if (curTab === 'tradein') renderTradeIn(c);
  else renderProdukcja(c);
}
window.renderApp = renderApp;

/* ===================== 1. CELE I ZADANIA ===================== */
function renderCele(root) {
  if (curSub === 0) {
    /* --- Cele AAK --- */
    {
      const wrap = document.createElement('div');
      const c = DATA.cele;
      const pct = c.cel_zespolowy > 0 ? Math.round(c.wykonanie_realne / c.cel_zespolowy * 100) : 0;
      const fillCls = pct >= 80 ? 'good' : (pct >= 50 ? 'blue' : '');
      let card = `<div class="card"><h3>Cel zespołowy AAK — lipiec 2026</h3>`;
      card += `<div class="pbar"><div class="fill ${fillCls}" style="width:${Math.min(pct, 100)}%"></div><div class="txt">${c.wykonanie_realne} / ${c.cel_zespolowy} (${pct}%)</div></div>`;
      card += `<div class="kpi-tiles" style="margin-top:14px">
        <div class="tile"><div class="lbl">Brakuje</div><div class="val">${c.brakuje}</div></div>
        <div class="tile"><div class="lbl">Upływ miesiąca</div><div class="val">${Math.round(c.uplyw * 100)}<small>%</small></div></div>
        <div class="tile"><div class="lbl">Bank ABKbm</div><div class="val">${c.abk_bm}</div></div>
        <div class="tile"><div class="lbl">FK bez AAK</div><div class="val">${c.fk}</div></div></div></div>`;
      wrap.innerHTML = card;
      root.appendChild(wrap);
    }
    {
      const wrap = document.createElement('div');
      const rows = DATA.cele.cele.map(h => h.flota
        ? `<tr style="color:var(--dim)">
            <td>${esc(h.name)} <span class="badge dim">flota</span></td>
            <td class="num">—</td>
            <td class="num"><b style="color:#e8eef7">${h.wykonanie}</b></td>
            <td class="num">—</td><td class="num">—</td>
            <td>${statusBadge('flota')}</td></tr>`
        : `<tr>
            <td>${esc(h.name)}</td>
            <td class="num">${h.cel}</td>
            <td class="num"><b style="color:#e8eef7">${h.wykonanie}</b> ${minibar(h.wykonanie, h.cel, h.pct >= 80 ? 'good' : h.pct >= 40 ? 'warn' : 'bad', 60)}</td>
            <td class="num">${h.brakuje}</td>
            <td class="num">${h.pct}%</td>
            <td>${statusBadge(h.status)}</td></tr>`).join('');
      const bez = DATA.cele.bez_celu.length ? `<div class="desc" style="margin-top:10px">Bez celu indywidualnego: ${DATA.cele.bez_celu.map(esc).join(', ')}</div>` : '';
      wrap.innerHTML = `<div class="card"><h3>Cele indywidualne</h3>
        ${tbl('<th>Handlowiec</th><th class="num">Cel</th><th class="num">Wykonanie</th><th class="num">Brakuje</th><th class="num">%</th><th>Status</th>', rows)}${bez}</div>`;
      root.appendChild(wrap);
    }
  } else if (curSub === 1) {
    /* --- Zadania --- */
    {
      const wrap = document.createElement('div');
      let html = '<div class="task-grid">';
      DATA.cele.zadania.forEach(z => {
        const sum = z.handlowcy.reduce((a, h) => a + h.wykonanie, 0);
        const cel = z.handlowcy.reduce((a, h) => a + h.cel, 0);
        const pct = cel > 0 ? Math.round(sum / cel * 100) : 0;
        html += `<div class="card"><h3>${esc(z.nazwa)} <span class="badge blue">cel ${z.cel_ind}/os.</span></h3>
          <div class="pbar"><div class="fill ${pct >= 80 ? 'good' : pct >= 50 ? 'blue' : ''}" style="width:${Math.min(pct, 100)}%"></div><div class="txt">${sum} / ${cel} (${pct}%)</div></div>
          <div style="margin-top:12px">`;
        z.handlowcy.forEach(h => {
          const p = h.cel > 0 ? Math.min(100, Math.round(h.wykonanie / h.cel * 100)) : 0;
          html += `<div class="person-row"><div class="nm">${esc(h.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div><div class="sc">${h.wykonanie}/${h.cel}</div></div>`;
        });
        html += '</div></div>';
      });
      html += '</div><div class="banner">Trade-in = szanse przekazane w CRM (arkusz RAPORT). Opinie Google — narastająco za lipiec.</div>';
      wrap.innerHTML = html;
      root.appendChild(wrap);
    }
  } else if (curSub === 2) {
    /* --- Realizacja --- */
    {
      const wrap = document.createElement('div');
      const d = DATA.realizacja.detal, f = DATA.realizacja.flota, r = DATA.realizacja.razem;
      const row = (nm, o, extra) => `<tr><td><b>${nm}</b></td><td class="num">${o.aak}</td><td class="num">${o.aek}</td><td class="num">${o.abk_bm}</td><td class="num">${o.fk}</td><td class="num">${extra}</td><td class="num">${Math.round(o.uplyw * 100)}%</td></tr>`;
      wrap.innerHTML = `<div class="card"><h3>Realizacja — detal vs flota</h3>
        ${tbl('<th>Obszar</th><th class="num">AAK</th><th class="num">AEK</th><th class="num">ABKbm</th><th class="num">FK bez AAK</th><th class="num">AAKmax</th><th class="num">Upływ</th>',
        row('Detal', d, d.aakmax) + row('Flota', f, f.aak + f.fk) +
        `<tr class="sum"><td>Razem</td><td class="num">${r.aak}</td><td class="num">${r.aek}</td><td class="num">${r.abk_bm}</td><td class="num">${r.fk}</td><td class="num">${r.aakmax}</td><td class="num">${Math.round(DATA.cele.uplyw * 100)}%</td></tr>`)}
        <div class="desc" style="margin-top:10px">AAKmax = AAK + FK bez AAK (potencjalny wynik, gdy wszystkie faktury zostaną zaliczone).</div></div>`;
      root.appendChild(wrap);
    }
    {
      const wrap = document.createElement('div');
      const r = DATA.realizacja.razem;
      wrap.innerHTML = `<div class="card"><h3>Prognoza / widget AAK</h3>
        <div class="kpi-tiles">
          <div class="tile"><div class="lbl">AAKmax (potencjał)</div><div class="val" style="color:var(--accent)">${r.aakmax}</div></div>
          <div class="tile"><div class="lbl">AAK + ABKbm</div><div class="val">${r.aak + r.abk_bm}</div></div>
          <div class="tile"><div class="lbl">AEH (bank dealerski)</div><div class="val">${r.aeh}</div><div class="lbl">Δ +${r.d_aeh}</div></div>
          <div class="tile"><div class="lbl">180 dni bm</div><div class="val" style="color:var(--warn)">${r.s180bm}</div></div>
          <div class="tile"><div class="lbl">KSWbm</div><div class="val">${r.kswbm}</div></div>
        </div>
        <div class="desc">Widget prognozy AAK6 pojawi się, gdy w danych będzie dostępna prognoza per auto (kolumna AAK6).</div></div>`;
      root.appendChild(wrap);
    }
  } else {
    /* --- Stan zamówień AEK --- */
    {
      const wrap = document.createElement('div');
      const rows = Object.keys(DATA.stan_aek).map(k => {
        const o = DATA.stan_aek[k];
        return `<tr><td><b>${esc(k)}</b></td><td class="num" style="color:var(--good)">+${o.p}</td><td class="num" style="color:var(--bad)">−${o.u}</td><td class="num"><b style="color:#e8eef7">${o.d >= 0 ? '+' : ''}${o.d}</b></td></tr>`;
      }).join('');
      const p = Object.values(DATA.stan_aek).reduce((a, o) => a + o.p, 0);
      const u = Object.values(DATA.stan_aek).reduce((a, o) => a + o.u, 0);
      const filt = DATA.filtered_records_count > 0
        ? `<div class="banner">Odfiltrowano ${DATA.filtered_records_count} rekordów (ubytki techniczne): ${DATA.filtered_clients.map(esc).join(', ')}</div>`
        : '<div class="desc" style="margin-top:10px">Brak odfiltrowanych ubytków technicznych w tym raporcie.</div>';
      wrap.innerHTML = `<div class="card"><h3>Stan zamówień AEK per obszar — lipiec</h3>
        ${tbl('<th>Obszar</th><th class="num">Przyrosty</th><th class="num">Ubytki</th><th class="num">Delta</th>',
        rows + `<tr class="sum"><td>Razem</td><td class="num">+${p}</td><td class="num">−${u}</td><td class="num">${p - u >= 0 ? '+' : ''}${p - u}</td></tr>`)}${filt}</div>`;
      root.appendChild(wrap);
    }
  }
}

/* ===================== 2. HANDLOWCY ===================== */
function renderHandlowcy(root) {
  if (curSub === 0) {
    {
      const wrap = document.createElement('div');
      const mk = (list) => list.map(h => `<tr>
        <td>${esc(h.name)}</td>
        <td class="num" style="color:var(--good)">+${h.p_rd}</td>
        <td class="num" style="color:var(--good)">+${h.p_fl}</td>
        <td class="num" style="color:var(--bad)">−${h.u}</td>
        <td class="num"><b style="color:#e8eef7">${h.d >= 0 ? '+' : ''}${h.d}</b> ${minibar(Math.max(h.d, 0), 6, 'good', 50)}</td></tr>`).join('');
      wrap.innerHTML = `<div class="card"><h3>AEK — zespół detaliczny</h3>
        <div class="desc">+RD = przyrosty retail · +Flota = przyrosty small fleet (obszar detaliczny)</div>
        ${tbl('<th>Handlowiec</th><th class="num">+RD</th><th class="num">+Flota</th><th class="num">Ubytki</th><th class="num">Delta</th>', mk(DATA.handlowcy_detal))}</div>`;
      root.appendChild(wrap);
    }
    {
      const wrap = document.createElement('div');
      const rows = DATA.handlowcy_flota.map(h => `<tr><td>${esc(h.name)}</td><td class="num" style="color:var(--good)">+${h.p}</td><td class="num" style="color:var(--bad)">−${h.u}</td><td class="num"><b style="color:#e8eef7">+${h.d}</b></td></tr>`).join('');
      wrap.innerHTML = `<div class="grid2"><div class="card"><h3>AEK — flota</h3>
        ${tbl('<th>Handlowiec</th><th class="num">Przyrosty</th><th class="num">Ubytki</th><th class="num">Delta</th>', rows || '<tr><td colspan="4" class="empty">brak</td></tr>')}</div>
        <div class="card"><h3>Kanały sprzedaży (przyrosty AEK)</h3>
        ${tbl('<th>Kanał</th><th class="num">AEK</th><th></th>', DATA.kanaly.map(k => `<tr><td>${esc(k.kanal)}</td><td class="num"><b style="color:#e8eef7">${k.aek}</b></td><td>${minibar(k.aek, Math.max(...DATA.kanaly.map(x => x.aek), 1), '', 90)}</td></tr>`).join(''))}</div></div>`;
      root.appendChild(wrap);
    }
  } else if (curSub === 1) {
    {
      const wrap = document.createElement('div');
      const n = DATA.kpi_handlowcy.filter(h => !h.flota).length;
      const kc = DATA.kpi_cele;
      const sum = (f) => DATA.kpi_handlowcy.reduce((a, h) => a + h[f], 0);
      const rows = DATA.kpi_handlowcy.map(h => `<tr><td>${esc(h.name)}${h.flota ? ' <span class="badge dim">flota</span>' : ''}</td>
        <td class="num">${h.oferty}</td><td class="num">${h.klienci}</td><td class="num">${h.zamowienia}</td>
        <td class="num">${h.wydania}</td><td class="num">${h.traffic}</td><td class="num">${h.opinie}</td><td class="num">${h.trade_in}</td></tr>`).join('');
      const sumRow = `<tr class="sum"><td>Zespół (cel ×${n} detal)</td>
        <td class="num">${sum('oferty')}</td>
        <td class="num">${sum('klienci')} / ${kc.klienci * n}</td>
        <td class="num">${sum('zamowienia')}</td>
        <td class="num">${sum('wydania')}</td>
        <td class="num">${sum('traffic')}</td>
        <td class="num">${sum('opinie')} / ${kc.opinie * n}</td>
        <td class="num">${sum('trade_in')} / ${kc.trade_in * n}</td></tr>`;
      wrap.innerHTML = `<div class="card"><h3>KPI narastające — lipiec</h3>
        ${tbl('<th>Handlowiec</th><th class="num">Oferty</th><th class="num">Klienci</th><th class="num">Zamówienia</th><th class="num">Wydania</th><th class="num">Traffic</th><th class="num">Opinie</th><th class="num">Trade-in</th>', rows + sumRow, 640)}
        <div class="desc" style="margin-top:10px">Dane narastające za lipiec z arkusza RAPORT (CRM zespołu). Kolumny „zamówienia" i „wydania" wg CRM — mogą różnić się od AEK/AAK zaliczanych przez VGP.</div></div>`;
      root.appendChild(wrap);
    }
  } else if (curSub === 2) {
    {
      const wrap = document.createElement('div');
      const max = Math.max(...DATA.ranking_combined.map(r => r.suma), 1);
      const rows = DATA.ranking_combined.map((r, i) => `<tr${i === 0 && r.suma > 0 ? ' class="hl-green"' : ''}>
        <td>${i + 1}.</td><td>${esc(r.name)}</td>
        <td class="num">${r.aak}</td><td class="num">${r.aek >= 0 ? '+' : ''}${r.aek}</td>
        <td class="num"><b style="color:#e8eef7">${r.suma}</b> ${minibar(r.suma, max, i === 0 ? 'good' : '', 80)}</td></tr>`).join('');
      wrap.innerHTML = `<div class="card"><h3>Ranking łączny AAK + AEK</h3>
        ${tbl('<th>#</th><th>Handlowiec</th><th class="num">AAK</th><th class="num">AEK Δ</th><th class="num">Razem</th>', rows)}</div>`;
      root.appendChild(wrap);
    }
  } else if (curSub === 3) {
    renderGrafik(root);
  } else {
    {
      const wrap = document.createElement('div');
      if (DATA.opinie_google.length === 0) {
        wrap.innerHTML = '<div class="banner">Brak opinii Google w danych tego raportu.</div>';
      } else {
        wrap.innerHTML = '<div class="desc">Źródło: arkusz RAPORT, zakładka Opinie. Nowe opinie wyróżniane są niebieską ramką.</div>' + DATA.opinie_google.map(o => `<div class="card"${o.nowa ? ' style="border-color:var(--accent)"' : ''}>
          <div class="desc" style="margin:0 0 6px">${esc(o.data)} · <b>${esc(o.nazwa)}</b> · opiekun: ${esc(o.handlowiec)} ${o.nowa ? '<span class="badge blue">nowa</span>' : ''}</div>
          <div>${esc(o.tresc)}</div></div>`).join('');
      }
      root.appendChild(wrap);
    }
  }
}

/* --- Grafik --- */
function renderGrafik(root) {
  const wrap = document.createElement('div');
  const g = DATA.grafik[grafikMonth];
  let head = '<th>Handlowiec</th>';
  for (let d = 1; d <= g.dni; d++) {
    const wd = g.weekdays[String(d)];
    const hol = g.holidays[String(d)];
    head += `<th class="${hol ? 'hol' : (wd >= 5 ? 'wknd' : '')}">${d}</th>`;
  }
  let rows = '';
  if (g.handlowcy.length === 0) rows = `<tr><td colspan="${g.dni + 1}" class="empty">Grafik na ${g.mc_label} — do uzupełnienia</td></tr>`;
  g.handlowcy.forEach(h => {
    rows += `<tr><td>${esc(h.short)}</td>`;
    for (let d = 1; d <= g.dni; d++) {
      const v = h.days[d - 1] || '';
      const wd = g.weekdays[String(d)];
      const hol = g.holidays[String(d)];
      const cls = (hol ? 'hol' : (wd >= 5 ? 'wknd' : '')) + (v === 'U' ? ' g-U' : v === 'Z' ? ' g-Z' : v === 'S' ? ' g-S' : '');
      rows += `<td class="${cls.trim()}">${esc(v)}</td>`;
    }
    rows += '</tr>';
  });
  let urlopy = '';
  if (g.plan_urlopowy.length) {
    urlopy = '<div class="card"><h3>Plan urlopowy — ' + esc(g.mc_label) + '</h3>' +
      tbl('<th>Od</th><th>Do</th><th>Kto</th><th>Typ</th>', g.plan_urlopowy.map(u => `<tr><td>${u.d_od}.${String(g.mc).padStart(2, '0')}</td><td>${u.d_do}.${String(g.mc).padStart(2, '0')}</td><td>${esc(u.kto_full)}</td><td><span class="badge warn">${esc(u.typ)}</span></td></tr>`).join('')) + '</div>';
  } else {
    urlopy = '<div class="desc">Plan urlopowy: brak wpisów dla ' + esc(g.mc_label) + '.</div>';
  }
  wrap.innerHTML = `<div class="toggle">
      <button data-m="aktualny" class="${grafikMonth === 'aktualny' ? 'active' : ''}">${esc(DATA.grafik.aktualny.mc_label)}</button>
      <button data-m="nastepny" class="${grafikMonth === 'nastepny' ? 'active' : ''}">${esc(DATA.grafik.nastepny.mc_label)}</button></div>
    <div class="card"><h3>Grafik godzin — ${esc(g.mc_label)}</h3>
    <div class="desc">U = urlop · Z = L4 · S = szkolenie · liczba = godziny · puste = wolne. Grafik uzupełniany ręcznie przy aktualizacji.</div>
    <div class="table-wrap"><div class="table-scroll"><table class="grafik-table" style="min-width:${g.dni * 26 + 120}px"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div></div></div>${urlopy}`;
  wrap.querySelectorAll('.toggle button').forEach(b => b.addEventListener('click', () => { grafikMonth = b.dataset.m; renderApp(); }));
  root.appendChild(wrap);
}

/* ===================== 3. STOCK ===================== */
function renderStock(root) {
  if (curSub === 0) {
    {
      const wrap = document.createElement('div');
      const m = DATA.magazyn;
      const mkList = (arr) => tbl('<th>Model</th><th class="num">Szt.</th><th></th>',
        arr.map(x => `<tr><td>${esc(x.model)}</td><td class="num"><b style="color:#e8eef7">${x.n}</b></td><td>${minibar(x.n, Math.max(...arr.map(a => a.n), 1), '', 90)}</td></tr>`).join(''));
      wrap.innerHTML = `<div class="kpi-tiles">
          <div class="tile"><div class="lbl">Magazyn razem</div><div class="val">${m.razem}</div></div>
          <div class="tile"><div class="lbl">CU — klienckie</div><div class="val" style="color:var(--accent)">${m.klienc}</div></div>
          <div class="tile"><div class="lbl">DE — wolne</div><div class="val" style="color:var(--warn)">${m.wolne}</div></div>
        </div>
        <div class="grid2">
          <div class="card"><h3>CU per model</h3>${mkList(m.klienc_modele)}</div>
          <div class="card"><h3>DE per model</h3>${mkList(m.wolne_modele)}</div>
        </div>`;
      root.appendChild(wrap);
    }
  } else if (curSub === 1) {
    {
      const wrap = document.createElement('div');
      const mk = (arr, emptyTxt) => arr.length
        ? tbl('<th>VIN</th><th>Model</th><th>PZ</th><th class="num">Dni RTT</th><th class="num">Wiek prod.</th><th>Typ</th><th>AAK6 / opiekun</th>',
          arr.map(r => `<tr${r.aak6 ? ' class="hl-green"' : ''}>
            <td class="mono">${esc(r.vin)}</td><td>${esc(r.model)}</td><td>${esc(r.pz)}</td>
            <td class="num"><b style="color:${r.dni >= 120 ? 'var(--bad)' : 'var(--warn)'}">${r.dni}</b></td>
            <td class="num">${r.wiek}</td>
            <td><span class="badge ${r.typ === 'CU' ? 'blue' : 'dim'}">${r.typ}</span></td>
            <td>${esc(r.aak6) || '—'}</td></tr>`).join(''), 700)
        : `<div class="empty">${emptyTxt}</div>`;
      wrap.innerHTML = `<div class="card"><h3>Przeterminowane 120 dni+ <span class="badge bad">${DATA.przet.w120.length}</span></h3>
          <div class="desc">Dni RTT = age ready to transport. Wiersze zielone — auto ma przypisanego klienta/opiekuna (potencjalne AAK).</div>
          ${mk(DATA.przet.w120, 'Brak aut 120d+')}</div>
        <div class="card"><h3>Próg 90–120 dni <span class="badge warn">${DATA.przet.w90.length}</span></h3>
          ${mk(DATA.przet.w90, 'Brak aut w progu 90–120 dni')}</div>`;
      root.appendChild(wrap);
    }
  } else if (curSub === 2) {
    {
      const wrap = document.createElement('div');
      const mk = (arr) => arr.length
        ? tbl('<th>Data</th><th>Model</th><th>VIN</th><th>Typ</th><th>Handlowiec</th>',
          arr.map(r => `<tr><td>${esc(r.data)}</td><td>${esc(r.model)}</td><td class="mono">${esc(r.vin)}</td><td><span class="badge ${r.typ === 'CU' ? 'blue' : 'dim'}">${r.typ}</span></td><td>${esc(r.sprzedawca) || '—'}</td></tr>`).join(''), 560)
        : '<div class="empty">Brak dostaw w oknie 7 dni</div>';
      wrap.innerHTML = `<div class="desc">Okno: ostatnie 7 dni (od ${esc(DATA.dostawy.cutoff)})</div>
        <div class="card"><h3>Przyjęcia na VGP (PZ) <span class="badge blue">${DATA.dostawy.vgp.length}</span></h3>${mk(DATA.dostawy.vgp)}</div>
        <div class="card"><h3>Wydania do dealera (AAH) <span class="badge good">${DATA.dostawy.aah.length}</span></h3>${mk(DATA.dostawy.aah)}</div>`;
      root.appendChild(wrap);
    }
  } else if (curSub === 3) {
    {
      const wrap = document.createElement('div');
      const rows = DATA.prognoza.map(p => `<tr${p.mc === 'brak' ? ' style="color:var(--dim)"' : ''}>
        <td><b>${fmtMc(p.mc)}</b></td><td class="num">${p.cu}</td><td class="num">${p.de}</td><td class="num"><b style="color:#e8eef7">${p.razem}</b></td></tr>`).join('');
      const sum = DATA.prognoza.reduce((a, p) => ({ cu: a.cu + p.cu, de: a.de + p.de }), { cu: 0, de: 0 });
      let hh = '<th>Handlowiec</th>' + DATA.prognoza_mies.map(m => `<th class="num">${fmtMc(m).split(' ')[0]}</th>`).join('') + '<th class="num">Razem</th>';
      const hrows = DATA.prognoza_handlowcy.map(h => `<tr><td>${esc(h.name)}</td>` + DATA.prognoza_mies.map(m => `<td class="num">${h[m] || ''}</td>`).join('') + `<td class="num"><b style="color:#e8eef7">${h.razem}</b></td></tr>`).join('');
      wrap.innerHTML = `<div class="card"><h3>Prognoza dostaw — pipeline wg ETA</h3>
          ${tbl('<th>Miesiąc ETA</th><th class="num">CU</th><th class="num">DE</th><th class="num">Razem</th>',
        rows + `<tr class="sum"><td>Razem pipeline</td><td class="num">${sum.cu}</td><td class="num">${sum.de}</td><td class="num">${sum.cu + sum.de}</td></tr>`)}</div>
        <div class="card"><h3>Pipeline CU per handlowiec</h3>
          ${tbl(hh, hrows, 640)}</div>`;
      root.appendChild(wrap);
    }
  } else if (curSub === 4) {
    root.innerHTML = DATA.push.length
      ? ''
      : '<div class="banner">Lista <b>Push / OrderList</b> nie występuje w raporcie zbiorczym — auta push z komentarzami AAK6/AAK6X pojawią się po dodaniu ich do obiektu <span class="mono">DATA.push</span> przy aktualizacji.</div>';
  } else {
    root.innerHTML = '<div class="banner">Auta <b>funkcyjne</b> — w bieżącym raporcie brak aut o statusie FUNKCYJNY na magazynie. Sekcja zapełni się automatycznie, gdy takie auta pojawią się w danych.</div>';
  }
}

/* ===================== 4. TRADE-IN CRM ===================== */
function renderTradeIn(root) {
  const t = DATA.trade_in_crm;
  if (!t.aktywny) {
    root.innerHTML = `<div class="banner" style="text-align:center;padding:28px">
      <div style="font-size:16px;font-weight:700;color:#e8eef7;margin-bottom:6px">Moduł Trade-in CRM</div>
      Ruszy od <b>${esc(t.start_label || 'nowego miesiąca')}</b>.</div>`;
    return;
  }
  const wygTbl = (arr) => arr.length
    ? tbl('<th>Data</th><th>Klient</th><th>Pojazd</th><th>VIN</th><th>Handlowiec</th>',
      arr.map(w => `<tr class="hl-green"><td>${esc(w.data)}</td><td>${esc(w.klient || '')}</td><td>${esc(w.pojazd)}</td><td class="mono">${esc(w.vin)}</td><td>${esc(w.handlowiec)}</td></tr>`).join(''), 620)
    : '<div class="empty">Brak odkupów (status „Wygrany") w tym okresie</div>';
  const rkTbl = (arr) => arr.length
    ? tbl('<th>Handlowiec</th><th class="num">Przekazane</th><th class="num">Odkupione</th><th class="num">Konwersja</th>',
      arr.map(r => `<tr><td>${esc(r.name)}</td><td class="num">${r.przekazane}</td><td class="num"><b style="color:#e8eef7">${r.odkupione}</b></td><td class="num">${r.konwersja}% ${minibar(r.konwersja, 100, r.konwersja >= 30 ? 'good' : '', 60)}</td></tr>`).join(''))
    : '<div class="empty">Brak przekazanych szans w tym okresie</div>';
  const sumWyg = (arr) => arr.reduce((a, r) => a + r.odkupione, 0);
  const sumPrz = (arr) => arr.reduce((a, r) => a + r.przekazane, 0);
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="kpi-tiles">
      <div class="tile"><div class="lbl">Odkupy — ${esc(t.miesiac_label)}</div><div class="val" style="color:var(--accent)">${t.wygranych.length}</div></div>
      <div class="tile"><div class="lbl">Odkupy — ${esc(t.poprzedni_label || 'poprzedni mc')}</div><div class="val">${t.poprzedni_wygranych.length}</div></div>
      <div class="tile"><div class="lbl">Przekazane — ${esc(t.poprzedni_label || 'poprzedni mc')}</div><div class="val">${sumPrz(t.poprzedni_ranking)}</div></div>
      <div class="tile"><div class="lbl">Konwersja zespołu — czerwiec</div><div class="val">${sumPrz(t.poprzedni_ranking) ? Math.round(sumWyg(t.poprzedni_ranking) / sumPrz(t.poprzedni_ranking) * 100) : 0}<small>%</small></div></div>
    </div>
    <div class="card"><h3>Odkupione (Wygrany) — ${esc(t.miesiac_label)}</h3>${wygTbl(t.wygranych)}</div>
    <div class="card"><h3>Ranking konwersji — ${esc(t.miesiac_label)}</h3>${rkTbl(t.ranking)}</div>
    <div class="card"><h3>Poprzedni miesiąc — odkupione (${esc(t.poprzedni_label || '')})</h3>${wygTbl(t.poprzedni_wygranych)}</div>
    <div class="card"><h3>Poprzedni miesiąc — ranking (${esc(t.poprzedni_label || '')})</h3>${rkTbl(t.poprzedni_ranking)}
      <div class="desc" style="margin-top:10px">Tylko zespół Volkswagen (salon VW Katowice). Przekazane = szanse w CRM, odkupione = status „Wygrany". W CRM brak jeszcze rekordów utworzonych w lipcu (ostatni wpis: 30.06).</div></div>`;
  root.appendChild(wrap);
}

/* ===================== 5. INFORMACJA PRODUKCYJNA ===================== */
function renderProdukcja(root) {
  const keys = ['komunikaty', 'przerwy', 'kalendarz', 'restrykcje'];
  const labels = ['Komunikaty', 'Przerwy produkcyjne', 'Kalendarz', 'Restrykcje'];
  const arr = DATA.produkcja[keys[curSub]] || [];
  if (arr.length === 0) {
    root.innerHTML = `<div class="banner">Sekcja „${labels[curSub]}" zaciągana jest z bieżącej <b>Informacji Handlowej (${esc(DATA.meta.ih_numer)})</b> —
      raport zbiorczy VGP nie zawiera treści IH. Uzupełnij tablicę <span class="mono">DATA.produkcja.${keys[curSub]}</span> wpisami
      <span class="mono">{ data, tytul, tresc }</span> przy aktualizacji.</div>`;
    return;
  }
  root.innerHTML = arr.map(k => `<div class="card"><h3>${esc(k.tytul)}</h3><div class="desc" style="margin:0 0 8px">${esc(k.data || '')}</div><div>${esc(k.tresc)}</div></div>`).join('');
}
</script>
